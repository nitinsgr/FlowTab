version: '3.8'

services:
  queue-service:
    image: node:20-alpine
    container_name: queue-service
    working_dir: /app
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://postgres:example@postgres:5432/restaurantdb
      - JWT_SECRET=supersecret
    volumes:
      - ./services/queue-service/src:/app/src
      - ./services/queue-service/package.json:/app/package.json:ro
    command: ["npm", "run", "dev"]
    ports:
      - "3000:3000"

  analytics-service:
    image: node:20-alpine
    container_name: analytics-service
    working_dir: /app
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://postgres:example@postgres:5432/restaurantdb
      - JWT_SECRET=supersecret
    volumes:
      - ./services/analytics-service/src:/app/src
      - ./services/analytics-service/package.json:/app/package.json:ro
    command: ["npm", "run", "dev"]
    ports:
      - "3002:3001"

  frontend:
    image: node:20-alpine
    container_name: frontend
    working_dir: /app
    environment:
      - REACT_APP_API_URL=http://localhost:3000/api
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/package.json:/app/package.json:ro
    command: ["npm", "start"]
    ports:
      - "3001:80"

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: restaurantdb
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  pg_data: